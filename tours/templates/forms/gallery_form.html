{% extends 'base.html' %}
{% load static %}

{% block title %}New Tour{% endblock %}

{% block content %}

<h1>New Photo</h1>
<p>Welcome to our amazing tour site! Please fill out the form below to add a new
photo to our collection.</p>
<div class="form-container">
    <form enctype="multipart/form-data" action="" method="post">
        {% csrf_token %}    
        {{ form.as_p }} 
        <input type="submit" value="Submit">
        <a class="cancel" href="/gallery"> Cancel </a>
    </form>
</div>
{% endblock %}
