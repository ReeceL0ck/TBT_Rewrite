{% extends 'base.html' %} 
{% load static %}   

{% block content %}
<div style="justify-content: center; align-items: center; display: flex; flex-direction: column;">
<h1>Log In</h1>
<form class="auth-form" method="post">
  {% csrf_token %}
  {{ form }}
  <button style="margin-top: 20px;" class="form-submit" type="submit">Log In</button>
</form>
<p style="text-align: center;">Don't have an account? <a    class="signup" href="{% url 'signup' %}">Signup</a></p>
</div>
{% endblock %}
