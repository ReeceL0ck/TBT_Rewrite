{% extends 'base.html' %} 
{% load static %}   

{% block content %}
<div style="justify-content: center; align-items: center; display: flex; flex-direction: column;">
<h1>Create an account</h1>
<form class="auth-form" method="post">
  {% csrf_token %}
  {{ form }}
  <button style="margin-top: 10px;" class="form-submit" type="submit">Sign Up</button>
</form>
<p style="text-align: center;">Already have an account? <a    class="signup" href="{% url 'login' %}">Login</a></p>
</div>
</body>
{% endblock %}
